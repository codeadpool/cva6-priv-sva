name: ci
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          version: '2026-04-07'
      - run: make versions
      - name: no assumes (soundness gate)
        run: |
          if grep -rnw assume fv/; then echo "unexpected assume in fv/ (free inputs only)"; exit 1; fi
          echo "no assumes in fv/"
      # The five expected-CEX probes fail bmc by design, so keep going and gate on
      # the explicit verdict check below rather than the aggregate exit code
      - run: make -k verify-all || true
      - run: make results || true
      - name: assert expected verdicts
        run: |
          set -e
          pass() { test -f "results/$1/PASS" || { echo "MISSING PASS: $1"; exit 1; }; }
          fail() { test -f "results/$1/FAIL" || { echo "PROBE NOT FAILING: $1"; exit 1; }; }
          # proven checks: every task passes bmc/prove/cover
          for t in bmc prove cover; do
            pass "pmp/pmp_entry_$t"
            pass "pmp/pmp_match_$t"
            pass "pmp/pmp_ref_$t"
            pass "csr/csr_warl_$t"
            pass "trap/trap_priv_$t"
            pass "vm/vm_$t"
          done
          # expected-CEX probes (the findings): bmc fails, cover reaches
          for p in mstatus/mstatus_f5 mstatus/mstatus_mprv \
                   probe/probe_pmp_mpri probe/probe_priv_dret \
                   probe/probe_dcsr_reserved; do
            fail "${p}_bmc"
            pass "${p}_cover"
          done
          # probes carrying a prove task must also fail it on golden: an
          # unbounded proof here would mean the defect is gonefrom v5.3.0
          for p in mstatus/mstatus_f5 probe/probe_priv_dret \
                   probe/probe_dcsr_reserved; do
            fail "${p}_prove"
          done
          echo "all verdicts as expected"

  # Mutation testing (~26 rebuilds), on demand only
  mutation:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          version: '2026-04-07'
      - run: bash fv/validation/mutation_test.sh
